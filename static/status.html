<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>status — syamxm.com</title>
<meta name="description" content="Live service status for syamxm.com and self-hosted projects.">
<meta property="og:title" content="status — syamxm.com">
<meta property="og:description" content="Live service status for syamxm.com and self-hosted projects.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://status.syamxm.com/status">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231E1E2E'/><text x='50' y='70' font-size='54' text-anchor='middle' fill='%23BD93F9' font-family='monospace'>~%3E</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1E1E2E;
  --bg-raise:#252537;
  --sel:#313244;
  --fg:#CDD6F4;
  --muted:#7F849C;
  --dim:#585B70;
  --purple:#BD93F9;
  --green:#A6E3A1;
  --red:#F38BA8;
  --yellow:#F9E2AF;
  --line:#2A2A3C;
  --blink:530ms;
  --glow-purple:rgba(189,147,249,.45);
  --glow-green:rgba(166,227,161,.4);
  --glow-yellow:rgba(249,226,175,.35);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:
    radial-gradient(1100px 700px at 88% -12%,rgba(166,227,161,.055),transparent 60%),
    radial-gradient(1300px 850px at 8% 4%,rgba(189,147,249,.075),transparent 62%),
    var(--bg);
  color:var(--muted);
  font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:clamp(14.5px,13px + .18vw,17px);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding-bottom:12vh;
  overflow-x:hidden;
}
/* atmosphere: vignette + phosphor scanlines + film grain — desktop only */
@media (min-width:769px){
  body::before{
    content:"";
    position:fixed;inset:0;z-index:3;pointer-events:none;
    background:
      radial-gradient(ellipse 120% 90% at 50% 50%,transparent 58%,rgba(10,10,18,.38) 100%),
      repeating-linear-gradient(180deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.09) 2px 3px);
  }
}
@media (min-width:769px) and (prefers-reduced-motion:no-preference){
  body::after{
    content:"";
    position:fixed;inset:-60%;z-index:3;pointer-events:none;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='240' height='240' filter='url(%23n)'/></svg>");
    opacity:.038;
    animation:grain 8s steps(10) infinite;
  }
  @keyframes grain{
    0%,100%{transform:translate(0,0)}
    10%{transform:translate(-4%,-7%)}
    20%{transform:translate(-9%,3%)}
    30%{transform:translate(6%,-12%)}
    40%{transform:translate(-3%,11%)}
    50%{transform:translate(-8%,-5%)}
    60%{transform:translate(7%,4%)}
    70%{transform:translate(-2%,8%)}
    80%{transform:translate(4%,-10%)}
    90%{transform:translate(9%,6%)}
  }
}
::selection{background:var(--purple);color:var(--bg)}

.prompt{color:var(--green);text-shadow:0 0 10px rgba(166,227,161,.22)}
.prompt .tick{color:var(--purple);text-shadow:0 0 8px var(--glow-purple),0 0 26px rgba(189,147,249,.2)}
.cmd{color:var(--fg)}
.flag{color:var(--purple)}
.comment{color:var(--dim)}

.cursor{
  display:inline-block;
  width:9px;height:1.05em;
  background:var(--purple);
  vertical-align:-2px;
  margin-left:2px;
  border-radius:1px;
  box-shadow:0 0 8px var(--glow-purple),0 0 22px rgba(189,147,249,.3);
}
.blink{animation:blink var(--blink) steps(1) infinite}
@keyframes blink{50%{opacity:0}}

.anim .ln{opacity:0;transform:translateY(14px)}
.anim .ln.in{
  opacity:1;transform:none;
  transition:opacity .65s var(--ease),transform .65s var(--ease);
}
@media (min-width:769px){
  .anim .ln{filter:blur(5px)}
  .anim .ln.in{
    filter:blur(0);
    transition:opacity .65s var(--ease),transform .65s var(--ease),filter .5s var(--ease);
  }
}

/* boot overlay — once per session */
#boot{
  position:fixed;inset:0;z-index:20;
  background:var(--bg);
  padding:clamp(18px,5vh,64px) clamp(18px,6vw,80px);
  opacity:1;transition:opacity .45s var(--ease);
}
#boot pre{
  font-size:clamp(11px,1.6vw,13.5px);line-height:1.9;
  color:var(--green);text-shadow:0 0 8px var(--glow-green);
  white-space:pre-wrap;
}
#boot.off{opacity:0;pointer-events:none}
#boothint{
  position:absolute;bottom:24px;left:0;right:0;text-align:center;
  font-size:11px;color:var(--dim);
  animation:blink 1.2s steps(1) infinite;
}
.booting{overflow:hidden}

/* ---- status bar ---- */
.statusbar{
  position:fixed;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;gap:14px;
  height:40px;padding:0 20px;
  background:rgba(30,30,46,.94);
  border-bottom:1px solid rgba(189,147,249,.14);
  box-shadow:0 8px 32px -12px rgba(0,0,0,.5);
  font-size:12px;color:var(--dim);
}
.statusbar .dot{width:11px;height:11px;border-radius:50%;transition:filter .3s}
.dots{display:flex;gap:7px;margin-right:6px}
.d1{background:rgba(243,139,168,.8)}
.d2{background:rgba(249,226,175,.8)}
.d3{background:rgba(166,227,161,.8)}
.statusbar:hover .d1{filter:drop-shadow(0 0 4px var(--red))}
.statusbar:hover .d2{filter:drop-shadow(0 0 4px var(--yellow))}
.statusbar:hover .d3{filter:drop-shadow(0 0 4px var(--green))}
.statusbar .path{color:var(--muted)}
.statusbar .path b{color:var(--purple);font-weight:500}
.statusbar .right{margin-left:auto;display:flex;gap:18px}
.statusbar .right span::before{content:"● ";color:var(--green);text-shadow:0 0 6px var(--glow-green)}
@media(max-width:620px){.statusbar .right{display:none}}
@media(min-width:769px){
  .statusbar{
    background:rgba(30,30,46,.55);
    backdrop-filter:blur(16px) saturate(1.5);
    -webkit-backdrop-filter:blur(16px) saturate(1.5);
  }
}

.shell{
  max-width:1000px;
  margin:0 auto;
  padding:0 28px;
  position:relative;
  z-index:1;
}
@media(max-width:620px){.shell{padding:0 20px}}
main{padding-top:clamp(96px,12vh,140px)}

.cmdline{font-size:15px;margin-bottom:26px}

/* ---- overall banner ---- */
.banner{
  font-size:clamp(19px,2.6vw,28px);
  font-weight:700;
  margin-bottom:34px;
  transition:color .3s var(--ease),text-shadow .3s var(--ease);
}
.banner.ok{color:var(--green);text-shadow:0 0 18px var(--glow-green),0 0 50px rgba(166,227,161,.15)}
.banner.degraded{color:var(--yellow);text-shadow:0 0 16px var(--glow-yellow),0 0 46px rgba(249,226,175,.14)}
.banner.err{color:var(--red);text-shadow:0 0 16px rgba(243,139,168,.3)}

/* ---- service rows ---- */
.svc{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 18px;margin:0 -18px;
  border-left:2px solid transparent;
  border-radius:4px;
  transition:background .35s var(--ease),border-color .3s var(--ease);
}
.svc:hover{background:rgba(49,50,68,.55)}
.svc.live{border-left-color:var(--green)}
.svc.maintenance{border-left-color:var(--yellow)}
.svc.down{border-left-color:var(--red)}
.svc .perm{color:var(--dim);font-size:12px;letter-spacing:.05em}
.svc .name{color:var(--fg);font-weight:500;flex:1;min-width:12ch}
.svc .badge{
  font-size:12px;min-width:14ch;text-align:right;
  transition:color .3s var(--ease),text-shadow .3s var(--ease);
}
.svc .badge.live{color:var(--green);text-shadow:0 0 9px var(--glow-green)}
.svc .badge.maintenance{color:var(--yellow);text-shadow:0 0 8px var(--glow-yellow)}
.svc .badge.down{color:var(--red);text-shadow:0 0 10px rgba(243,139,168,.25)}

.svc .ind{
  width:10px;height:10px;border-radius:50%;flex:none;
  transition:background .3s var(--ease),box-shadow .3s var(--ease);
}
.svc.live .ind{background:var(--green);box-shadow:0 0 8px var(--glow-green)}
.svc.maintenance .ind{background:var(--yellow);box-shadow:0 0 8px var(--glow-yellow)}
.svc.down .ind{background:var(--red);box-shadow:0 0 8px rgba(243,139,168,.4)}
@media (prefers-reduced-motion:no-preference){
  .svc.live .ind{animation:pulse 2.6s var(--ease) infinite}
  .svc.maintenance .ind{animation:blink var(--blink) steps(1) infinite}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 6px var(--glow-green)}
    50%{box-shadow:0 0 14px var(--glow-green),0 0 26px rgba(166,227,161,.2)}
  }
}

.foot{
  margin-top:64px;padding-top:20px;border-top:1px solid var(--line);
  font-size:12px;color:var(--dim);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
.foot a{color:var(--purple);text-decoration:none}
.foot a:hover,.foot a:focus-visible{text-shadow:0 0 12px var(--glow-purple);outline:none}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div class="statusbar" role="presentation">
  <div class="dots"><span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span></div>
  <span class="path">syamxm@<b>homeserver</b>: ~/status</span>
  <div class="right">
    <span id="checked">checking…</span>
  </div>
</div>

<div class="shell">
<main>
  <section>
    <div class="cmdline">
      <span class="prompt"><span class="tick">~&gt;</span> </span><span class="cmd">switchboard</span> <span class="flag">status --all</span><span class="cursor blink"></span>
    </div>
    <p class="banner ln" id="banner">probing services…</p>
    <div id="list" aria-live="polite"></div>
    <div class="foot ln">
      <span><a href="https://syamxm.com">syamxm.com</a> — self-hosted, deployed over tailscale</span>
      <span id="footchecked"></span>
    </div>
  </section>
</main>
</div>

<script>
(function(){
  var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var banner = document.getElementById("banner");
  var list = document.getElementById("list");
  var checkedEl = document.getElementById("checked");
  var footChecked = document.getElementById("footchecked");
  var rows = {};
  var lastChecked = null;
  var firstRender = true;

  /* ---- boot overlay, once per session ---- */
  function boot(done){
    if(reduce || sessionStorage.getItem("sb-booted")){ done(); return; }
    sessionStorage.setItem("sb-booted", "1");

    var LINES = [
      ["switchboard v1 — status probe", ""],
      ["net: cloudflare tunnel up", "ok"],
      ["probing services ...", ""],
      ["cache: warm (ttl 30s)", "ok"],
      ["rendering report ...", ""]
    ];

    var el = document.createElement("div");
    el.id = "boot";
    el.setAttribute("aria-hidden", "true");
    var pre = document.createElement("pre");
    el.appendChild(pre);
    var hint = document.createElement("span");
    hint.id = "boothint";
    hint.textContent = "press any key to skip";
    el.appendChild(hint);
    document.body.appendChild(el);
    document.body.classList.add("booting");

    var i = 0, finished = false, timer = 0;
    function line(){
      if(i >= LINES.length){ finish(); return; }
      var l = LINES[i++];
      pre.textContent += l[0] + (l[1] ? "  [ " + l[1].toUpperCase() + " ]" : "") + "\n";
      timer = setTimeout(line, 110);
    }
    function finish(){
      if(finished) return;
      finished = true;
      clearTimeout(timer);
      window.removeEventListener("keydown", finish);
      window.removeEventListener("pointerdown", finish);
      el.classList.add("off");
      document.body.classList.remove("booting");
      setTimeout(function(){ el.remove(); }, 500);
      done();
    }
    window.addEventListener("keydown", finish);
    window.addEventListener("pointerdown", finish);
    setTimeout(line, 150);
    setTimeout(finish, 1600);
  }

  function badgeText(state){
    if(state === "live") return "● live";
    if(state === "maintenance") return "◐ maintenance";
    return "○ down";
  }

  function makeRow(site){
    var row = document.createElement("div");
    row.className = "svc ln";

    var perm = document.createElement("span");
    perm.className = "perm";
    perm.textContent = "dr-xr-xr-x";

    var ind = document.createElement("span");
    ind.className = "ind";

    var name = document.createElement("span");
    name.className = "name";
    name.textContent = site.host;

    var badge = document.createElement("span");
    badge.className = "badge";

    row.append(perm, ind, name, badge);
    list.appendChild(row);
    return {row: row, badge: badge};
  }

  function render(data){
    data.sites.forEach(function(site){
      var r = rows[site.host] || (rows[site.host] = makeRow(site));
      r.row.className = "svc ln in " + site.state;
      r.badge.className = "badge " + site.state;
      r.badge.textContent = badgeText(site.state);
    });

    if(data.all_ok){
      banner.textContent = "all systems green";
      banner.className = "banner ln in ok";
    } else {
      var maint = data.sites.filter(function(s){ return s.state === "maintenance"; }).length;
      var down = data.sites.filter(function(s){ return s.state === "down"; }).length;
      var parts = [];
      if(maint) parts.push(maint + " in maintenance");
      if(down) parts.push(down + " down");
      banner.textContent = "degraded — " + parts.join(" · ");
      banner.className = "banner ln in degraded";
    }

    if(firstRender){
      firstRender = false;
      if(!reduce){
        document.body.classList.add("anim");
        var lns = document.querySelectorAll(".ln");
        lns.forEach(function(l, i){
          l.classList.remove("in");
          setTimeout(function(){ l.classList.add("in"); }, i * 55);
        });
      }
    }
  }

  function tickChecked(){
    if(lastChecked === null) return;
    var s = Math.max(0, Math.round((Date.now() - lastChecked) / 1000));
    var label = "checked " + s + "s ago";
    checkedEl.textContent = label;
    footChecked.textContent = label + " · polls every 30s";
  }
  setInterval(tickChecked, 1000);

  async function load(){
    try {
      var res = await fetch("/api/status");
      if(!res.ok) throw new Error("HTTP " + res.status);
      var data = await res.json();
      lastChecked = Date.now();
      render(data);
      tickChecked();
    } catch(err){
      banner.textContent = "status unavailable — " + err.message;
      banner.className = "banner ln in err";
    }
  }

  boot(function(){
    load();
    setInterval(function(){ if(!document.hidden) load(); }, 30000);
  });
})();
</script>
</body>
</html>
