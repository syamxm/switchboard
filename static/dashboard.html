<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>switchboard — ~/switchboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1E1E2E;
  --bg-raise:#252537;
  --sel:#313244;
  --fg:#CDD6F4;
  --muted:#7F849C;
  --dim:#585B70;
  --purple:#BD93F9;
  --green:#A6E3A1;
  --red:#F38BA8;
  --yellow:#F9E2AF;
  --line:#2A2A3C;
  --blink:530ms;
  --glow-purple:rgba(189,147,249,.45);
  --glow-green:rgba(166,227,161,.4);
  --glow-yellow:rgba(249,226,175,.35);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:
    radial-gradient(1100px 700px at 88% -12%,rgba(166,227,161,.055),transparent 60%),
    radial-gradient(1300px 850px at 8% 4%,rgba(189,147,249,.075),transparent 62%),
    var(--bg);
  color:var(--muted);
  font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:clamp(14.5px,13px + .18vw,17px);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding-bottom:12vh;
  overflow-x:hidden;
}
/* atmosphere: vignette + phosphor scanlines + film grain — desktop only */
@media (min-width:769px){
  body::before{
    content:"";
    position:fixed;inset:0;z-index:3;pointer-events:none;
    background:
      radial-gradient(ellipse 120% 90% at 50% 50%,transparent 58%,rgba(10,10,18,.38) 100%),
      repeating-linear-gradient(180deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.09) 2px 3px);
  }
}
@media (min-width:769px) and (prefers-reduced-motion:no-preference){
  body::after{
    content:"";
    position:fixed;inset:-60%;z-index:3;pointer-events:none;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='240' height='240' filter='url(%23n)'/></svg>");
    opacity:.038;
    animation:grain 8s steps(10) infinite;
  }
  @keyframes grain{
    0%,100%{transform:translate(0,0)}
    10%{transform:translate(-4%,-7%)}
    20%{transform:translate(-9%,3%)}
    30%{transform:translate(6%,-12%)}
    40%{transform:translate(-3%,11%)}
    50%{transform:translate(-8%,-5%)}
    60%{transform:translate(7%,4%)}
    70%{transform:translate(-2%,8%)}
    80%{transform:translate(4%,-10%)}
    90%{transform:translate(9%,6%)}
  }
}
::selection{background:var(--purple);color:var(--bg)}

.prompt{color:var(--green);text-shadow:0 0 10px rgba(166,227,161,.22)}
.prompt .tick{color:var(--purple);text-shadow:0 0 8px var(--glow-purple),0 0 26px rgba(189,147,249,.2)}
.cmd{color:var(--fg)}
.flag{color:var(--purple)}
.comment{color:var(--dim)}

.cursor{
  display:inline-block;
  width:9px;height:1.05em;
  background:var(--purple);
  vertical-align:-2px;
  margin-left:2px;
  border-radius:1px;
  box-shadow:0 0 8px var(--glow-purple),0 0 22px rgba(189,147,249,.3);
}
.blink{animation:blink var(--blink) steps(1) infinite}
@keyframes blink{50%{opacity:0}}

.anim .ln{opacity:0;transform:translateY(14px)}
.anim .ln.in{
  opacity:1;transform:none;
  transition:opacity .65s var(--ease),transform .65s var(--ease);
}
@media (min-width:769px){
  .anim .ln{filter:blur(5px)}
  .anim .ln.in{
    filter:blur(0);
    transition:opacity .65s var(--ease),transform .65s var(--ease),filter .5s var(--ease);
  }
}

/* ---- status bar ---- */
.statusbar{
  position:fixed;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;gap:14px;
  height:40px;padding:0 20px;
  background:rgba(30,30,46,.94);
  border-bottom:1px solid rgba(189,147,249,.14);
  box-shadow:0 8px 32px -12px rgba(0,0,0,.5);
  font-size:12px;color:var(--dim);
}
.statusbar .dot{width:11px;height:11px;border-radius:50%;transition:filter .3s}
.dots{display:flex;gap:7px;margin-right:6px}
.d1{background:rgba(243,139,168,.8)}
.d2{background:rgba(249,226,175,.8)}
.d3{background:rgba(166,227,161,.8)}
.statusbar:hover .d1{filter:drop-shadow(0 0 4px var(--red))}
.statusbar:hover .d2{filter:drop-shadow(0 0 4px var(--yellow))}
.statusbar:hover .d3{filter:drop-shadow(0 0 4px var(--green))}
.statusbar .path{color:var(--muted)}
.statusbar .path b{color:var(--purple);font-weight:500}
.statusbar .right{margin-left:auto;display:flex;gap:18px}
.statusbar .right span::before{content:"● ";color:var(--green);text-shadow:0 0 6px var(--glow-green)}
.statusbar .right span.degraded::before{color:var(--yellow);text-shadow:0 0 6px var(--glow-yellow)}
@media(max-width:620px){.statusbar .right{display:none}}
@media(min-width:769px){
  .statusbar{
    background:rgba(30,30,46,.55);
    backdrop-filter:blur(16px) saturate(1.5);
    -webkit-backdrop-filter:blur(16px) saturate(1.5);
  }
}

.shell{
  max-width:1000px;
  margin:0 auto;
  padding:0 28px;
  position:relative;
  z-index:1;
}
@media(max-width:620px){.shell{padding:0 20px}}
main{padding-top:clamp(96px,12vh,140px)}

.cmdline{font-size:15px;margin-bottom:26px}

/* ---- service rows ---- */
.svc{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 18px;margin:0 -18px;
  border-left:2px solid transparent;
  border-radius:4px;
  transition:background .35s var(--ease),border-color .3s var(--ease);
}
.svc:hover{background:rgba(49,50,68,.55)}
.svc.live{border-left-color:var(--green)}
.svc.maintenance{border-left-color:var(--yellow)}
.svc.down{border-left-color:var(--red)}
.svc .perm{color:var(--dim);font-size:12px;letter-spacing:.05em}
.svc .name{
  color:var(--fg);text-decoration:none;font-weight:500;
  flex:1;min-width:12ch;
  transition:color .3s,text-shadow .3s;
}
.svc .name:hover,.svc .name:focus-visible{color:var(--purple);text-shadow:0 0 14px var(--glow-purple);outline:none}
.svc .http{color:var(--dim);font-size:12px;min-width:5ch}
.svc .badge{
  font-size:12px;min-width:14ch;
  transition:color .3s var(--ease),text-shadow .3s var(--ease);
}
.svc .badge.live{color:var(--green);text-shadow:0 0 9px var(--glow-green)}
.svc .badge.maintenance{color:var(--yellow);text-shadow:0 0 8px var(--glow-yellow)}
.svc .badge.down{color:var(--red);text-shadow:0 0 10px rgba(243,139,168,.25)}

/* ---- toggle switch ---- */
.switch{
  position:relative;flex:none;
  width:46px;height:24px;
  border:1px solid var(--line);border-radius:12px;
  background:var(--bg-raise);
  cursor:pointer;
  transition:border-color .3s var(--ease),box-shadow .3s var(--ease);
}
.switch .knob{
  position:absolute;top:3px;left:4px;
  width:16px;height:16px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--glow-green);
  transition:transform .3s var(--ease),background .3s var(--ease),box-shadow .3s var(--ease);
}
.switch[aria-checked="true"] .knob{
  transform:translateX(21px);
  background:var(--yellow);
  box-shadow:0 0 10px var(--glow-yellow),0 0 24px rgba(249,226,175,.2);
}
.switch:hover{border-color:rgba(189,147,249,.4)}
.switch:focus-visible{outline:2px solid var(--purple);outline-offset:2px}
.switch[disabled]{opacity:.5;cursor:wait}

/* ---- action log ---- */
.log{margin-top:30px;font-size:13px}
.log .label{color:var(--dim);font-size:11px;display:block;margin-bottom:6px}
.log .entry{
  color:var(--muted);white-space:pre-wrap;word-break:break-word;
  transition:opacity .5s var(--ease);
}
.log .entry .t{color:var(--dim)}
.log .entry .ok{color:var(--green);text-shadow:0 0 9px var(--glow-green)}
.log .entry .warn{color:var(--yellow);text-shadow:0 0 8px var(--glow-yellow)}
.log .entry.fade{opacity:0}
.log:not(:has(.entry)) {display:none}

.errline{color:var(--red);text-shadow:0 0 10px rgba(243,139,168,.25);margin-top:16px;font-size:13px}
.errline:empty{display:none}

.foot{
  margin-top:64px;padding-top:20px;border-top:1px solid var(--line);
  font-size:12px;color:var(--dim);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div class="statusbar" role="presentation">
  <div class="dots"><span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span></div>
  <span class="path">syamxm@<b>homeserver</b>: ~/switchboard</span>
  <div class="right">
    <span id="clock">--:--:--</span>
    <span id="greencount">…</span>
  </div>
</div>

<div class="shell">
<main>
  <section>
    <div class="cmdline">
      <span class="prompt"><span class="tick">~&gt;</span> </span><span class="cmd">systemctl</span> <span class="flag">status --all</span><span class="cursor blink"></span>
    </div>
    <div id="list" aria-live="polite"></div>
    <div class="log" id="log" aria-live="polite">
      <span class="label"># action log — last 5</span>
    </div>
    <p class="errline" id="err"></p>
    <div class="foot ln">
      <span>switchboard — flag files in /etc/nginx/flags</span>
      <span id="footstat">polling every 30s</span>
    </div>
  </section>
</main>
</div>

<script>
(function(){
  var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var list = document.getElementById("list");
  var log = document.getElementById("log");
  var errEl = document.getElementById("err");
  var clock = document.getElementById("clock");
  var greencount = document.getElementById("greencount");
  var rows = {};
  var firstRender = true;

  function pad(n){ return (n < 10 ? "0" : "") + n; }
  function hms(){
    var d = new Date();
    return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  }
  clock.textContent = hms();
  setInterval(function(){ clock.textContent = hms(); }, 1000);

  function badgeText(site){
    if(site.state === "live") return "● live";
    if(site.state === "maintenance") return "◐ maintenance";
    return "○ down";
  }

  function makeRow(site){
    var row = document.createElement("div");
    row.className = "svc ln";

    var perm = document.createElement("span");
    perm.className = "perm";
    perm.textContent = "drwxr-xr-x";

    var name = document.createElement("a");
    name.className = "name";
    name.href = "https://" + site.host;
    name.target = "_blank";
    name.rel = "noopener";
    name.textContent = site.host;

    var http = document.createElement("span");
    http.className = "http";

    var badge = document.createElement("span");
    badge.className = "badge";

    var sw = document.createElement("button");
    sw.className = "switch";
    sw.type = "button";
    sw.setAttribute("role", "switch");
    sw.setAttribute("aria-label", "maintenance mode for " + site.host);
    var knob = document.createElement("span");
    knob.className = "knob";
    sw.appendChild(knob);
    sw.addEventListener("click", function(){ toggle(site.host, sw); });

    row.append(perm, name, http, badge, sw);
    list.appendChild(row);
    return {row: row, http: http, badge: badge, sw: sw};
  }

  function updateRow(site){
    var r = rows[site.host] || (rows[site.host] = makeRow(site));
    r.row.className = "svc ln in " + site.state;
    r.http.textContent = site.http_status === null ? "[---]" : "[" + site.http_status + "]";
    r.badge.className = "badge " + site.state;
    r.badge.textContent = badgeText(site);
    r.sw.setAttribute("aria-checked", String(site.maintenance));
  }

  function render(sites){
    sites.forEach(updateRow);
    var green = sites.filter(function(s){ return s.state === "live"; }).length;
    greencount.textContent = green + "/" + sites.length + " services green";
    greencount.className = green === sites.length ? "" : "degraded";
    if(firstRender){
      firstRender = false;
      if(!reduce){
        document.body.classList.add("anim");
        var lns = document.querySelectorAll(".ln");
        lns.forEach(function(l, i){
          l.classList.remove("in");
          setTimeout(function(){ l.classList.add("in"); }, i * 55);
        });
      }
    }
  }

  function logLine(host, maintenance){
    var e = document.createElement("div");
    e.className = "entry";
    var t = document.createElement("span");
    t.className = "t";
    t.textContent = "[ " + hms() + " ] ";
    var body = document.createElement("span");
    body.textContent = host + " → " + (maintenance ? "maintenance " : "live ");
    var tag = document.createElement("span");
    tag.className = maintenance ? "warn" : "ok";
    tag.textContent = maintenance ? "[ FLAG SET ]" : "[ FLAG CLEARED ]";
    e.append(t, body, tag);
    log.appendChild(e);

    var entries = log.querySelectorAll(".entry");
    if(entries.length > 5){
      var oldest = entries[0];
      if(reduce){ oldest.remove(); }
      else {
        oldest.classList.add("fade");
        setTimeout(function(){ oldest.remove(); }, 500);
      }
    }
  }

  async function load(){
    try {
      var res = await fetch("/api/sites");
      if(!res.ok) throw new Error("HTTP " + res.status);
      render(await res.json());
      errEl.textContent = "";
    } catch(err){
      errEl.textContent = "fetch failed: " + err.message + " — retrying next poll";
    }
  }

  async function toggle(host, sw){
    sw.disabled = true;
    try {
      var res = await fetch("/api/sites/" + encodeURIComponent(host) + "/toggle", {method: "POST"});
      if(!res.ok) throw new Error("HTTP " + res.status);
      var data = await res.json();
      logLine(data.host, data.maintenance);
      errEl.textContent = "";
    } catch(err){
      errEl.textContent = "toggle failed for " + host + ": " + err.message;
    }
    await load();
    sw.disabled = false;
  }

  load();
  setInterval(function(){ if(!document.hidden) load(); }, 30000);
})();
</script>
</body>
</html>
