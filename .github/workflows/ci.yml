name: CI

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Static analysis
        run: semgrep scan --config p/python --config p/security-audit --error --severity ERROR

  build:
    runs-on: ubuntu-latest
    needs: [lint-test, semgrep]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t switchboard:ci .

  trivy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Scan repo config for misconfigurations
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Build image
        run: docker build -t switchboard:ci .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: switchboard:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
