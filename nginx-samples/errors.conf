# Include inside each server block that should support maintenance mode:
#   include /etc/nginx/conf.d/snippets/errors.conf;
#
# Requires the error page at /var/www/errors/error.html and the flags
# directory /etc/nginx/flags (shared with the switchboard container as /flags).

if (-f /etc/nginx/flags/$host.flag) {
    return 503;
}

error_page 404 /error.html;
error_page 503 /error.html;

location = /error.html {
    root /var/www/errors;
    internal;
}
