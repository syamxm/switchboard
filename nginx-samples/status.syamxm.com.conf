# Public read-only face, exposed via Cloudflare Tunnel.
# Proxies ONLY /status and /api/status — the dashboard and toggle
# endpoints are unreachable through this server block.

server {
    listen 80;
    server_name status.syamxm.com;

    location = /status {
        proxy_pass http://switchboard:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location = /api/status {
        proxy_pass http://switchboard:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location / {
        return 404;
    }
}
